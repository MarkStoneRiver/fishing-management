<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売買仕切書アップロード</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .hidden {
            display: none;
        }
        #previewContainer {
            position: relative;
            margin-top: 20px;
            max-width: 100%;
            overflow: auto;
        }
        #previewImage {
            max-width: 100%;
            border: 1px solid #ddd;
        }
        .message-container {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .selection-controls {
            margin-top: 10px;
        }
        .selection-active {
            background-color: #ffc107;
        }
        .navigation-bar {
            background-color: #f8f9fa;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        .navigation-bar .btn {
            margin-right: 5px;
        }
        #previewCanvas {
            max-width: 100%;
            height: auto;
        }
        .preview-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- ナビゲーションバーを追加 -->
    <div class="navigation-bar">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <a href="/" class="btn btn-outline-primary">トップ</a>
                    <a href="/gyoba" class="btn btn-outline-primary">漁場一覧</a>
                    <a href="/fish_code_list" class="btn btn-outline-primary">魚種コード一覧</a>
                    <a href="/upload" class="btn btn-outline-primary">売買仕切書アップロード</a>
                    <a href="/compare" class="btn btn-outline-primary">データ比較</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h5>レシート画像</h5>
                        <div class="btn-group" role="group">
                            <button id="resetSelectionBtn" class="btn btn-outline-secondary btn-sm" disabled>選択リセット</button>
                            <button id="detectTableBtn" class="btn btn-outline-primary btn-sm" disabled>テーブル検出</button>
                        </div>
                    </div>
                    <div class="card-body text-center position-relative">
                        <div id="canvasContainer" class="d-inline-block position-relative">
                            <canvas id="imageCanvas" class="border"></canvas>
                            <canvas id="selectionCanvas" class="position-absolute top-0 left-0"></canvas>
                            <canvas id="headerCanvas" class="position-absolute top-0 left-0"></canvas>
                            <canvas id="dataCanvas" class="position-absolute top-0 left-0"></canvas>
                            <canvas id="cellCanvas" class="position-absolute top-0 left-0"></canvas>
                        </div>
                        
                        <!-- プレビュー要素の追加 -->
                        <div id="previewContainer" class="mt-3" style="display: none;">
                            <img id="previewImage" alt="プレビュー" class="img-fluid">
                        </div>
                        
                        <!-- キャンバス要素の追加 -->
                        <div id="preview-container" class="mt-3" style="display: none;">
                            <canvas id="previewCanvas" class="border"></canvas>
                        </div>

                        <!-- PDFプレビュー要素の追加 -->
                        <div id="pdfPreviewContainer" class="mt-3" style="display: none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <button id="prevPage" class="btn btn-sm btn-outline-secondary">前のページ</button>
                                <div>
                                    <span id="currentPage">1</span> / <span id="totalPages">1</span>
                                </div>
                                <button id="nextPage" class="btn btn-sm btn-outline-secondary">次のページ</button>
                            </div>
                            <img id="pdfPagePreview" alt="PDFプレビュー" class="img-fluid border">
                            <div class="mt-2">
                                <button id="processCurrentPage" class="btn btn-sm btn-primary">このページを処理</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5>ファイルアップロード</h5>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm" enctype="multipart/form-data">
                            <div class="form-group">
                                <label for="file">ファイルを選択:</label>
                                <input type="file" class="form-control-file" id="imageUpload" name="file" accept=".jpg,.jpeg,.png,.pdf">
                            </div>
                            <div class="form-group">
                                <label for="catchDate">漁獲日:</label>
                                <input type="date" class="form-control" id="catchDate" name="catchDate" required>
                            </div>
                            <button type="submit" class="btn btn-primary">アップロード</button>
                        </form>
                        
                        <!-- メッセージ表示領域 -->
                        <div id="messageContainer" class="mt-3 message-container hidden"></div>
                        
                        <hr>
                        
                        <div id="filesContainer" class="mt-3">
                            <h6>アップロード済みファイル:</h6>
                            <ul id="filesList" class="list-group"></ul>
                        </div>
                    </div>
                </div>
                
                <div id="resultsSection" class="card mt-3" style="display: none;">
                    <div class="card-header">
                        <h5>検出結果</h5>
                    </div>
                    <div class="card-body">
                        <div id="resultsContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // グローバル変数
        let currentImagePath = null;
        let extractedData = [];
        let isSelecting = false;
        let startX, startY, endX, endY;
        let selectedRegions = [];
        let canvas, ctx;
        let headerColumns = {};
        let pdfPages = [];
        let currentPageIndex = 0;
        let imageScale = 1;
        let selectionArea = null;
        
        // 要素の参照
        const uploadForm = document.getElementById('uploadForm');
        const imageUpload = document.getElementById('imageUpload');
        const previewImage = document.getElementById('previewImage');
        const previewContainer = document.getElementById('previewContainer');
        const messageContainer = document.getElementById('messageContainer');
        const resultContainer = document.getElementById('resultContainer');
        const resultTableBody = document.getElementById('resultTableBody');
        const saveResultsButton = document.getElementById('saveResultsButton');
        const cellCanvas = document.getElementById('cellCanvas');
        
        // メッセージを表示
        function showMessage(message, isError = false) {
            if (!messageContainer) {
                console.error('メッセージコンテナが見つかりません');
                return;
            }
            messageContainer.innerHTML = message;
            messageContainer.classList.remove('hidden', 'success-message', 'error-message');
            messageContainer.classList.add(isError ? 'error-message' : 'success-message');
        }
        
        // キャンバスをクリア
        function clearCanvas(canvas) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        // 領域選択をリセット
        function resetSelection() {
            selectedRegions = [];
            selectionArea = null;
            // その他のリセット処理...
        }
        
        // アップロード処理関数
        function handleUpload() {
            console.log("アップロードボタンがクリックされました");
            const formData = new FormData();
            const file = imageUpload ? imageUpload.files[0] : null;
            
            if (!file) {
                showMessage('ファイルが選択されていません', true);
                return;
            }
            
            // 漁獲日の取得と追加
            const catchDate = document.getElementById('catchDate').value;
            if (!catchDate) {
                showMessage('漁獲日を指定してください', true);
                return;
            }
            
            // ファイルと漁獲日を明示的に追加
            formData.append('file', file); // ファイル名の修正
            formData.append('image', file); // 代替名も追加
            formData.append('catch_date', catchDate);
            
            // ファイルタイプの確認とログ出力
            console.log("ファイルタイプ:", file.type);
            console.log("漁獲日:", catchDate);
            
            showMessage('画像ファイルをアップロード中...');
            
            // ファイルのエラーチェック
            const ALLOWED_EXTENSIONS = ['.png', '.jpg', '.jpeg', '.gif', '.pdf'];
            const fileName = file.name.toLowerCase();
            if (!ALLOWED_EXTENSIONS.some(ext => fileName.endsWith(ext))) {
                showMessage(`エラー: サポートされていないファイル形式です。許可されている形式: ${ALLOWED_EXTENSIONS.join(', ')}`, true);
                return;
            }

            // 画像プレビューの準備
            const reader = new FileReader();
            reader.onload = function(e) {
                // プレビュー用の新しい画像オブジェクトを作成
                const img = new Image();
                img.onload = function() {
                    // プレビューキャンバスの取得と設定
                    const canvas = document.getElementById('previewCanvas');
                    if (!canvas) {
                        console.error('プレビューキャンバスが見つかりません');
                        return;
                    }
                    const ctx = canvas.getContext('2d');
                    
                    // キャンバスのサイズを画像に合わせて設定
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // 画像をキャンバスに描画
                    ctx.drawImage(img, 0, 0);
                    
                    // プレビューコンテナを表示
                    const previewContainer = document.getElementById('preview-container');
                    if (previewContainer) {
                        previewContainer.style.display = 'block';
                    }
                    
                    // 現在の画像として保存
                    window.currentImage = img;
                    
                    // 選択の初期化
                    initializeSelection(canvas);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            
            // サーバーへのアップロード処理
            fetch('/receipt_upload/upload_image', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log("サーバーからの応答ステータス:", response.status);
                if (!response.ok) {
                    throw new Error(`サーバーエラー: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log("サーバーからのレスポンス:", data);
                if (data.success) {
                    showMessage(data.message || '画像をアップロードしました');
                    currentImagePath = data.image_url;
                    
                    // 新しい画像がロードされた後に選択モードを初期化
                    if (window.currentImage) {
                        const canvas = document.getElementById('previewCanvas');
                        if (canvas) {
                            initializeSelection(canvas);
                        }
                    } else {
                        console.warn('現在の画像がロードされていません');
                    }
                    
                    if (data.results && data.results.length > 0) {
                        displayResults(data.results);
                    }
                    
                    // ボタンを有効化
                    const resetBtn = document.getElementById('resetSelectionBtn');
                    const detectBtn = document.getElementById('detectTableBtn');
                    if (resetBtn) resetBtn.disabled = false;
                    if (detectBtn) detectBtn.disabled = false;
                } else {
                    const errorMsg = data.error || 'アップロード処理中にエラーが発生しました';
                    showMessage(`エラー: ${errorMsg}`, true);
                    console.error('アップロードエラー:', data);
                }
            })
            .catch(error => {
                showMessage(`通信エラー: ${error}`, true);
                console.error('アップロード通信エラー:', error);
            });
        }
        
        // 画像アップロードフォームの送信
        if (uploadForm) {
            uploadForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleUpload();
            });
        }
        
        // 領域選択の初期化
        function initializeSelection(canvas) {
            if (!canvas) return;
            
            let isSelecting = false;
            let startX, startY;
            let currentSelection = null;
            
            // キャンバスのスケール比率を計算する関数
            function getCanvasScale() {
                // キャンバスの実際の表示サイズを取得
                const displayWidth = canvas.clientWidth;
                const displayHeight = canvas.clientHeight;
                
                // キャンバスの内部サイズ
                const realWidth = canvas.width;
                const realHeight = canvas.height;
                
                // スケール比率を計算
                const scaleX = realWidth / displayWidth;
                const scaleY = realHeight / displayHeight;
                
                return { scaleX, scaleY };
            }
            
            canvas.addEventListener('mousedown', function(e) {
                const rect = canvas.getBoundingClientRect();
                const scale = getCanvasScale();
                
                // 表示座標を取得
                const displayX = e.clientX - rect.left;
                const displayY = e.clientY - rect.top;
                
                // 実際のキャンバス座標に変換
                startX = displayX * scale.scaleX;
                startY = displayY * scale.scaleY;
                
                isSelecting = true;
                
                // 既存の選択をクリア
                if (currentSelection) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (window.currentImage) {
                        ctx.drawImage(window.currentImage, 0, 0, canvas.width, canvas.height);
                    }
                    currentSelection = null;
                }
                
                console.log('マウスダウン - 表示座標:', { displayX, displayY }, '実座標:', { startX, startY });
            });
            
            canvas.addEventListener('mousemove', function(e) {
                if (!isSelecting) return;
                
                const rect = canvas.getBoundingClientRect();
                const scale = getCanvasScale();
                
                // 表示座標を取得
                const displayX = e.clientX - rect.left;
                const displayY = e.clientY - rect.top;
                
                // 実際のキャンバス座標に変換
                const x = displayX * scale.scaleX;
                const y = displayY * scale.scaleY;
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (window.currentImage) {
                    ctx.drawImage(window.currentImage, 0, 0, canvas.width, canvas.height);
                }
                
                // 選択範囲を描画
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    Math.min(startX, x),
                    Math.min(startY, y),
                    Math.abs(x - startX),
                    Math.abs(y - startY)
                );
            });
            
            canvas.addEventListener('mouseup', function(e) {
                if (!isSelecting) return;
                isSelecting = false;
                
                const rect = canvas.getBoundingClientRect();
                const scale = getCanvasScale();
                
                // 表示座標を取得
                const displayX = e.clientX - rect.left;
                const displayY = e.clientY - rect.top;
                
                // 実際のキャンバス座標に変換
                const endX = displayX * scale.scaleX;
                const endY = displayY * scale.scaleY;
                
                // 選択範囲の座標を計算
                const x = Math.min(startX, endX);
                const y = Math.min(startY, endY);
                const width = Math.abs(endX - startX);
                const height = Math.abs(endY - startY);
                
                console.log('マウスアップ - 選択範囲:', { x, y, width, height });
                
                // 選択範囲が十分な大きさの場合のみ処理
                if (width > 10 && height > 10) {
                    currentSelection = { x, y, width, height };
                    selectionArea = currentSelection;
                    selectedRegions = [currentSelection];
                    
                    // 自動的にテーブル検出を開始
                    const detectBtn = document.getElementById('detectTableBtn');
                    if (detectBtn && !detectBtn.disabled) {
                        detectTableStructure(currentSelection);
                    }
                }
            });
        }
        
        // 表構造の検出
        function detectTableStructure(region) {
            if (!cellCanvas) {
                console.error('セルキャンバスが見つかりません');
                return;
            }
            
            clearCanvas(cellCanvas);
            
            showMessage('テーブル構造を検出中...', false);
            
            if (!currentImagePath) {
                showMessage('画像を選択してください', true);
                return;
            }
            
            // 領域が指定されていない場合はキャンバス全体を使用
            if (!region) {
                const canvas = document.getElementById('previewCanvas');
                if (canvas) {
                    region = {
                        x: 0,
                        y: 0,
                        width: canvas.width,
                        height: canvas.height
                    };
                } else {
                    showMessage('領域を選択してください', true);
                    return;
                }
            }
            
            // 領域サイズのチェック
            if (region.width < 50 || region.height < 50) {
                showMessage('選択領域が小さすぎます。もう少し大きな領域を選択してください', true);
                return;
            }
            
            // 画像パスを正規化
            let normalizedPath = currentImagePath;
            if (typeof normalizeImagePath === 'function') {
                normalizedPath = normalizeImagePath(currentImagePath);
            }
            
            const formData = new FormData();
            formData.append('image_path', normalizedPath);
            formData.append('selected_region', JSON.stringify(region));
            
            console.log("表構造認識リクエスト送信中:", normalizedPath);
            
            fetch('/receipt_upload/detect_table', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`サーバーエラー: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    showMessage(data.message || 'テーブル構造を検出しました');
                    
                    // 結果セクションを表示
                    const resultsSection = document.getElementById('resultsSection');
                    if (resultsSection) {
                        resultsSection.style.display = 'block';
                    }
                    
                    // 結果表示の処理...
                } else {
                    showMessage(data.message || 'テーブル構造の検出に失敗しました', true);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('テーブル構造の検出中にエラーが発生しました: ' + error.message, true);
            });
        }
        
        // パスの正規化関数
        function normalizeImagePath(path) {
            if (!path) return path;
            
            // 相対パスの処理
            if (path.includes('static/uploads')) {
                // static/uploadsで始まるようにする
                if (path.startsWith('/static/uploads')) {
                    path = path.substring(1);
                } else if (!path.startsWith('static/uploads')) {
                    // static/uploadsが含まれるが先頭にない場合は調整
                    const index = path.indexOf('static/uploads');
                    if (index > 0) {
                        path = path.substring(index);
                    }
                }
            }
            
            // パス区切り文字をすべてフォワードスラッシュに統一
            path = path.replace(/\\/g, '/');
            
            return path;
        }
        
        // イベントリスナーを設定
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded: イベントリスナーを設定します');
            
            // テーブル検出ボタンのイベントリスナー
            const detectTableBtn = document.getElementById('detectTableBtn');
            if (detectTableBtn) {
                detectTableBtn.addEventListener('click', function() {
                    detectTableStructure(selectionArea);
                });
            }
            
            // リセットボタンのイベントリスナー
            const resetSelectionBtn = document.getElementById('resetSelectionBtn');
            if (resetSelectionBtn) {
                resetSelectionBtn.addEventListener('click', function() {
                    resetSelection();
                    if (cellCanvas) {
                        clearCanvas(cellCanvas);
                    }
                    const resultsSection = document.getElementById('resultsSection');
                    if (resultsSection) {
                        resultsSection.style.display = 'none';
                    }
                });
            }
            
            console.log('イベントリスナーの設定が完了しました');
        });
    </script>
</body>
</html>
