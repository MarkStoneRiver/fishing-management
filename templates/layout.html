<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}漁獲量管理システム{% endblock %}</title>
    <style>
        body {
            font-family: 'Meiryo', 'Hiragino Kaku Gothic Pro', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        
        .navbar {
            background-color: #333;
            overflow: hidden;
            color: white;
        }
        
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        
        .navbar a:hover {
            background-color: #444;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
        /* 共通スタイル */
        .btn {
            display: inline-block;
            padding: 8px 12px;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .btn:hover {
            background-color: #45a049;
        }
        
        .btn-secondary {
            background-color: #f1f1f1;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background-color: #e7e7e7;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="navbar">
        <a href="/">ホーム</a>
        <a href="/fish_receipt">伝票登録</a>
        <a href="/fish_code_list">魚種コード</a>
        <a href="/receipt_upload">売買仕切書アップロード</a>
        <a href="/past_landings">過去水揚げ</a>
    </div>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <div class="footer">
        <p>&copy; 2023 漁獲量管理システム</p>
    </div>
    
    <!-- JavaScriptブロック -->
    {% block scripts %}{% endblock %}
</body>
</html>
