{% extends "layout.html" %}

{% block title %}AIチャット | 漁獲量管理システム{% endblock %}

{% block head %}
<style>
  /* layout.htmlのcontainerをチャット用にリセット */
  .container {
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: visible !important;
  }

  /* ページ全体レイアウト */
  .chat-layout {
    display: flex;
    position: fixed;
    top: 48px;   /* navbar */
    left: 0;
    right: 0;
    bottom: 40px; /* footer */
    overflow: hidden;
  }

  /* ── サイドバー ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: #2c2c2c;
    color: #eee;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.25s ease;
    z-index: 200;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid #444;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 0.9rem;
    font-weight: bold;
    color: #ccc;
  }

  .new-thread-btn {
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .new-thread-btn:hover { background: #45a049; }

  .thread-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .thread-item {
    display: flex;
    align-items: center;
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 6px;
    margin: 2px 6px;
    gap: 6px;
    transition: background 0.15s;
  }
  .thread-item:hover { background: #3a3a3a; }
  .thread-item.active { background: #4CAF50; color: white; }

  .thread-item-name {
    flex: 1;
    font-size: 0.88rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .thread-delete-btn {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .thread-item:hover .thread-delete-btn { opacity: 1; }
  .thread-item.active .thread-delete-btn { color: rgba(255,255,255,0.7); opacity: 1; }
  .thread-delete-btn:hover { color: #ff6b6b !important; }

  /* ── モバイル用オーバーレイ ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 150;
  }
  .sidebar-overlay.visible { display: block; }

  /* ── メインチャットエリア ── */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f5f5f5;
  }

  .chat-topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }

  .sidebar-toggle-btn {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: #555;
    padding: 2px 6px;
    border-radius: 4px;
    display: none; /* デスクトップでは非表示 */
  }
  .sidebar-toggle-btn:hover { background: #f0f0f0; }

  .current-thread-name {
    flex: 1;
    font-size: 0.95rem;
    font-weight: bold;
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .back-link {
    font-size: 0.82rem;
    color: #4CAF50;
    text-decoration: none;
    white-space: nowrap;
  }
  .back-link:hover { text-decoration: underline; }

  /* ── チャットログ ── */
  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble {
    max-width: 85%;
    padding: 11px 15px;
    border-radius: 12px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    font-size: 0.93rem;
  }

  .bubble-user {
    align-self: flex-end;
    background-color: #4CAF50;
    color: white;
    border-bottom-right-radius: 2px;
  }

  .bubble-ai {
    align-self: flex-start;
    background-color: #fff;
    border: 1px solid #ddd;
    border-bottom-left-radius: 2px;
  }

  .bubble-error {
    align-self: flex-start;
    background-color: #fff3f3;
    border: 1px solid #f99;
    color: #c00;
    border-bottom-left-radius: 2px;
  }

  .sql-block {
    margin-top: 10px;
    background-color: #f4f4f4;
    border-left: 3px solid #4CAF50;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    border-radius: 4px;
    color: #333;
  }

  .sql-label {
    font-size: 0.73rem;
    color: #999;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  .row-count {
    font-size: 0.73rem;
    color: #999;
    margin-top: 4px;
  }

  .bubble-thinking {
    align-self: flex-start;
    background-color: #fff;
    border: 1px solid #ddd;
    border-bottom-left-radius: 2px;
    color: #888;
    font-style: italic;
    animation: thinking-pulse 1.4s ease-in-out infinite;
  }
  @keyframes thinking-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  /* ── 空状態 ── */
  .empty-state {
    text-align: center;
    color: #bbb;
    margin: auto;
    font-size: 0.9rem;
    padding: 40px 20px;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
  }
  .chip {
    background: #fff;
    border: 1px solid #4CAF50;
    color: #4CAF50;
    border-radius: 16px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .chip:hover { background: #f0fff0; }

  /* スレッド未選択の案内 */
  .no-thread-state {
    text-align: center;
    color: #bbb;
    margin: auto;
    font-size: 0.9rem;
    padding: 40px 20px;
  }
  .no-thread-state .icon { font-size: 2.2rem; margin-bottom: 10px; }

  /* ── 入力エリア（fixed） ── */
  .input-area-outer {
    position: fixed;
    bottom: 40px;
    left: 260px; /* sidebarの幅 */
    right: 0;
    background: #f5f5f5;
    border-top: 1px solid #ddd;
    padding: 8px 14px;
    z-index: 100;
  }

  .input-area-inner {
    display: flex;
    gap: 8px;
    max-width: 760px;
    margin: 0 auto;
  }

  #question-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 24px;
    font-size: 0.93rem;
    outline: none;
    font-family: inherit;
    resize: none;
    height: 42px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }
  #question-input:focus { border-color: #4CAF50; }
  #question-input:disabled { background: #f0f0f0; }

  #send-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    border: none;
    border-radius: 50%;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #send-btn:hover { background: #45a049; }
  #send-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* ── モーダル ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }

  .modal-box {
    background: white;
    border-radius: 10px;
    padding: 24px 20px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal-box h3 {
    margin: 0 0 16px;
    font-size: 1rem;
  }
  .modal-box input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.93rem;
    font-family: inherit;
    box-sizing: border-box;
    outline: none;
  }
  .modal-box input:focus { border-color: #4CAF50; }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: flex-end;
  }
  .modal-actions button {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-size: 0.88rem;
    cursor: pointer;
  }
  .btn-primary { background: #4CAF50; color: white; }
  .btn-primary:hover { background: #45a049; }
  .btn-cancel { background: #eee; color: #555; }
  .btn-cancel:hover { background: #ddd; }

  /* ── レスポンシブ（768px以下） ── */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 48px;
      left: 0;
      bottom: 40px;
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-toggle-btn { display: block; }
    .input-area-outer { left: 0; }
    .bubble { max-width: 92%; }
  }
</style>
{% endblock %}

{% block content %}
<div class="chat-layout">

  <!-- サイドバー -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">チャット履歴</span>
      <button class="new-thread-btn" onclick="openNewThreadModal()">＋ 新規作成</button>
    </div>
    <div class="thread-list" id="thread-list">
      <!-- JSで描画 -->
    </div>
  </div>

  <!-- モバイル用オーバーレイ -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- メインチャットエリア -->
  <div class="chat-main">
    <div class="chat-topbar">
      <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="履歴を開く">&#9776;</button>
      <span class="current-thread-name" id="current-thread-name">スレッドを選択してください</span>
      <a href="/" class="back-link">← 戻る</a>
    </div>

    <div id="chat-log">
      <div class="no-thread-state" id="no-thread-state">
        <div class="icon">&#128196;</div>
        <div>左のサイドバーからスレッドを選ぶか、<br>新規作成してください</div>
      </div>
    </div>
  </div>
</div>

<!-- 入力エリア -->
<div class="input-area-outer" id="input-area-outer">
  <div class="input-area-inner">
    <textarea id="question-input" placeholder="質問を入力してください..." rows="1" disabled></textarea>
    <button id="send-btn" title="送信" disabled>&#9654;</button>
  </div>
</div>

<!-- 新規スレッド作成モーダル -->
<div class="modal-overlay" id="new-thread-modal">
  <div class="modal-box">
    <h3>新しいスレッドを作成</h3>
    <input type="text" id="new-thread-name-input" placeholder="スレッド名を入力..." maxlength="50">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewThreadModal()">キャンセル</button>
      <button class="btn-primary" onclick="createThread()">作成</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // ── 状態管理 ──────────────────────────────────────────────
  let currentThreadId = null;
  let currentThreadName = null;

  const chatLog      = document.getElementById('chat-log');
  const input        = document.getElementById('question-input');
  const sendBtn      = document.getElementById('send-btn');
  const threadList   = document.getElementById('thread-list');
  const threadNameEl = document.getElementById('current-thread-name');
  const noThreadEl   = document.getElementById('no-thread-state');

  // ── スレッド一覧 ──────────────────────────────────────────
  async function loadThreads() {
    const res = await fetch('/api/chat/threads');
    const threads = await res.json();
    renderThreadList(threads);
  }

  function renderThreadList(threads) {
    threadList.innerHTML = '';
    if (threads.length === 0) {
      const msg = document.createElement('div');
      msg.style.cssText = 'padding:20px 14px;color:#777;font-size:0.82rem;text-align:center;';
      msg.textContent = 'スレッドがありません';
      threadList.appendChild(msg);
      return;
    }
    threads.forEach(t => {
      const item = document.createElement('div');
      item.className = 'thread-item' + (t.thread_id === currentThreadId ? ' active' : '');
      item.dataset.threadId = t.thread_id;
      item.dataset.threadName = t.thread_name;

      const name = document.createElement('span');
      name.className = 'thread-item-name';
      name.textContent = t.thread_name;
      name.title = t.thread_name;

      const delBtn = document.createElement('button');
      delBtn.className = 'thread-delete-btn';
      delBtn.textContent = '✕';
      delBtn.title = 'このスレッドを削除';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        deleteThread(t.thread_id, t.thread_name);
      };

      item.appendChild(name);
      item.appendChild(delBtn);
      item.onclick = () => selectThread(t.thread_id, t.thread_name);
      threadList.appendChild(item);
    });
  }

  // ── スレッド選択 ──────────────────────────────────────────
  async function selectThread(threadId, threadName) {
    currentThreadId   = threadId;
    currentThreadName = threadName;
    threadNameEl.textContent = threadName;

    // アクティブ状態を更新
    document.querySelectorAll('.thread-item').forEach(el => {
      el.classList.toggle('active', el.dataset.threadId === threadId);
    });

    // 入力を有効化
    input.disabled = false;
    sendBtn.disabled = false;

    // 履歴を読み込んで表示
    chatLog.innerHTML = '';
    const res = await fetch(`/api/chat/threads/${threadId}`);
    const history = await res.json();

    if (history.length === 0) {
      appendEmptyState();
    } else {
      history.forEach(h => {
        appendBubble(h.question, 'user');
        appendAIBubble(h.answer, h.sql_query, null);
      });
      scrollToBottom();
    }

    // モバイルではサイドバーを閉じる
    if (window.innerWidth <= 768) closeSidebar();
  }

  function appendEmptyState() {
    const div = document.createElement('div');
    div.className = 'empty-state';
    div.id = 'empty-state';
    div.innerHTML = `
      <div class="icon">🐟</div>
      <div>漁獲データについて何でも聞いてください</div>
      <div class="suggestion-chips">
        <span class="chip" onclick="sendSuggestion(this)">今月の総水揚げ量は？</span>
        <span class="chip" onclick="sendSuggestion(this)">魚種別の水揚げ量ランキング</span>
        <span class="chip" onclick="sendSuggestion(this)">最近の伝票を10件表示して</span>
        <span class="chip" onclick="sendSuggestion(this)">昨年の水揚げ金額トップ5</span>
      </div>`;
    chatLog.appendChild(div);
  }

  // ── スレッド作成 ──────────────────────────────────────────
  function openNewThreadModal() {
    document.getElementById('new-thread-name-input').value = '';
    document.getElementById('new-thread-modal').classList.add('visible');
    setTimeout(() => document.getElementById('new-thread-name-input').focus(), 50);
  }

  function closeNewThreadModal() {
    document.getElementById('new-thread-modal').classList.remove('visible');
  }

  async function createThread() {
    const name = document.getElementById('new-thread-name-input').value.trim();
    if (!name) return;
    closeNewThreadModal();

    const res = await fetch('/api/chat/threads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thread_name: name })
    });
    const thread = await res.json();
    if (thread.error) { alert(thread.error); return; }

    await loadThreads();
    await selectThread(thread.thread_id, thread.thread_name);
  }

  // ── スレッド削除 ──────────────────────────────────────────
  async function deleteThread(threadId, threadName) {
    if (!confirm(`「${threadName}」を削除しますか？`)) return;
    await fetch(`/api/chat/threads/${threadId}`, { method: 'DELETE' });

    if (currentThreadId === threadId) {
      currentThreadId   = null;
      currentThreadName = null;
      threadNameEl.textContent = 'スレッドを選択してください';
      chatLog.innerHTML = '';
      const noThread = document.createElement('div');
      noThread.className = 'no-thread-state';
      noThread.innerHTML = '<div class="icon">&#128196;</div><div>左のサイドバーからスレッドを選ぶか、<br>新規作成してください</div>';
      chatLog.appendChild(noThread);
      input.disabled = true;
      sendBtn.disabled = true;
    }
    await loadThreads();
  }

  // ── サイドバートグル（モバイル） ────────────────────────
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('visible');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
  }

  // ── チャット送受信 ────────────────────────────────────────
  function appendBubble(text, type) {
    const div = document.createElement('div');
    div.className = `bubble bubble-${type}`;
    div.textContent = text;
    chatLog.appendChild(div);
    return div;
  }

  function appendAIBubble(answer, sql, rowCount) {
    const div = document.createElement('div');
    div.className = 'bubble bubble-ai';

    const answerEl = document.createElement('div');
    answerEl.textContent = answer;
    div.appendChild(answerEl);

    if (sql) {
      const label = document.createElement('div');
      label.className = 'sql-label';
      label.textContent = '実行したSQL';
      div.appendChild(label);

      const sqlEl = document.createElement('div');
      sqlEl.className = 'sql-block';
      sqlEl.textContent = sql;
      div.appendChild(sqlEl);

      if (rowCount !== null && rowCount !== undefined) {
        const rc = document.createElement('div');
        rc.className = 'row-count';
        rc.textContent = `${rowCount}件取得`;
        div.appendChild(rc);
      }
    }

    chatLog.appendChild(div);
    return div;
  }

  function showThinking() {
    const div = document.createElement('div');
    div.className = 'bubble bubble-thinking';
    div.textContent = '考え中...🐟';
    chatLog.appendChild(div);
    scrollToBottom();
    return div;
  }

  function scrollToBottom() {
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  async function sendQuestion(question) {
    if (!question || !currentThreadId) return;

    // 空状態を消す
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    const noThread = chatLog.querySelector('.no-thread-state');
    if (noThread) noThread.remove();

    appendBubble(question, 'user');
    scrollToBottom();

    input.value = '';
    input.style.height = '42px';
    sendBtn.disabled = true;
    input.disabled = true;

    const thinkingBubble = showThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          thread_id: currentThreadId,
          thread_name: currentThreadName
        })
      });
      const data = await res.json();

      // 考え中バブルを回答内容で置き換え
      thinkingBubble.className = 'bubble bubble-ai';
      thinkingBubble.style.animation = '';
      thinkingBubble.textContent = '';

      if (data.error) {
        thinkingBubble.className = 'bubble bubble-error';
        thinkingBubble.textContent = data.error;
        if (data.sql) {
          const label = document.createElement('div');
          label.className = 'sql-label';
          label.textContent = '生成されたSQL';
          thinkingBubble.appendChild(label);
          const sqlEl = document.createElement('div');
          sqlEl.className = 'sql-block';
          sqlEl.textContent = data.sql;
          thinkingBubble.appendChild(sqlEl);
        }
      } else {
        const answerEl = document.createElement('div');
        answerEl.textContent = data.answer;
        thinkingBubble.appendChild(answerEl);
        if (data.sql) {
          const label = document.createElement('div');
          label.className = 'sql-label';
          label.textContent = '実行したSQL';
          thinkingBubble.appendChild(label);
          const sqlEl = document.createElement('div');
          sqlEl.className = 'sql-block';
          sqlEl.textContent = data.sql;
          thinkingBubble.appendChild(sqlEl);
          const rc = document.createElement('div');
          rc.className = 'row-count';
          rc.textContent = `${data.row_count}件取得`;
          thinkingBubble.appendChild(rc);
        }
      }
    } catch (e) {
      thinkingBubble.className = 'bubble bubble-error';
      thinkingBubble.style.animation = '';
      thinkingBubble.textContent = '通信エラーが発生しました。';
    }

    sendBtn.disabled = false;
    input.disabled = false;
    scrollToBottom();
    input.focus();
  }

  function sendSuggestion(el) {
    sendQuestion(el.textContent.trim());
  }

  // ── イベント ──────────────────────────────────────────────
  sendBtn.addEventListener('click', () => sendQuestion(input.value.trim()));

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion(input.value.trim());
    }
  });

  input.addEventListener('input', () => {
    input.style.height = '42px';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // モーダルのEnterキー対応
  document.getElementById('new-thread-name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createThread();
    if (e.key === 'Escape') closeNewThreadModal();
  });

  // ── 初期化 ───────────────────────────────────────────────
  loadThreads();
</script>
{% endblock %}
