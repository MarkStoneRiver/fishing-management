{% extends "layout.html" %}

{% block title %}AIチャット | 漁獲量管理システム{% endblock %}

{% block head %}
<style>
  .chat-wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .chat-header h1 {
    font-size: 1.3rem;
    margin: 0;
  }

  .back-link {
    font-size: 0.85rem;
    color: #4CAF50;
    text-decoration: none;
  }

  .back-link:hover {
    text-decoration: underline;
  }

  #chat-log {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 16px;
  }

  .bubble {
    max-width: 90%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    font-size: 0.95rem;
  }

  .bubble-user {
    align-self: flex-end;
    background-color: #4CAF50;
    color: white;
    border-bottom-right-radius: 2px;
  }

  .bubble-ai {
    align-self: flex-start;
    background-color: #fff;
    border: 1px solid #ddd;
    border-bottom-left-radius: 2px;
  }

  .bubble-error {
    align-self: flex-start;
    background-color: #fff3f3;
    border: 1px solid #f99;
    color: #c00;
    border-bottom-left-radius: 2px;
  }

  .sql-block {
    margin-top: 10px;
    background-color: #f4f4f4;
    border-left: 3px solid #4CAF50;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 0.82rem;
    white-space: pre-wrap;
    border-radius: 4px;
    color: #333;
  }

  .sql-label {
    font-size: 0.75rem;
    color: #888;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  .row-count {
    font-size: 0.75rem;
    color: #888;
    margin-top: 4px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    border-bottom-left-radius: 2px;
    align-self: flex-start;
    width: fit-content;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background-color: #aaa;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .input-area {
    position: fixed;
    bottom: 40px;
    left: 0;
    right: 0;
    background: #f5f5f5;
    padding: 10px 15px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 8px;
    max-width: 800px;
    margin: 0 auto;
  }

  /* fixedの中央揃えのための調整 */
  .input-area-outer {
    position: fixed;
    bottom: 40px;
    left: 0;
    right: 0;
    background: #f5f5f5;
    border-top: 1px solid #ddd;
    padding: 10px 15px;
    z-index: 100;
  }

  .input-area-inner {
    display: flex;
    gap: 8px;
    max-width: 800px;
    margin: 0 auto;
  }

  #question-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 24px;
    font-size: 0.95rem;
    outline: none;
    font-family: inherit;
    resize: none;
    height: 42px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }

  #question-input:focus {
    border-color: #4CAF50;
  }

  #send-btn {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 50%;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #send-btn:hover { background-color: #45a049; }
  #send-btn:disabled { background-color: #aaa; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    color: #aaa;
    margin-top: 60px;
    font-size: 0.9rem;
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .chip {
    background: #fff;
    border: 1px solid #4CAF50;
    color: #4CAF50;
    border-radius: 16px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
  }

  .chip:hover { background-color: #f0fff0; }

  @media (max-width: 600px) {
    .chat-header h1 { font-size: 1.1rem; }
    .bubble { font-size: 0.9rem; }
  }
</style>
{% endblock %}

{% block content %}
<div class="chat-wrapper">
  <div class="chat-header">
    <h1>AIチャット</h1>
    <a href="/" class="back-link">← 漁獲管理に戻る</a>
  </div>

  <div id="chat-log">
    <div class="empty-state" id="empty-state">
      <div class="icon">🐟</div>
      <div>漁獲データについて何でも聞いてください</div>
      <div class="suggestion-chips">
        <span class="chip" onclick="sendSuggestion(this)">今月の総水揚げ量は？</span>
        <span class="chip" onclick="sendSuggestion(this)">魚種別の水揚げ量ランキング</span>
        <span class="chip" onclick="sendSuggestion(this)">最近の伝票を10件表示して</span>
        <span class="chip" onclick="sendSuggestion(this)">買受人別の取引量は？</span>
      </div>
    </div>
  </div>
</div>

<div class="input-area-outer">
  <div class="input-area-inner">
    <textarea id="question-input" placeholder="質問を入力してください..." rows="1"></textarea>
    <button id="send-btn" title="送信">&#9654;</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const chatLog = document.getElementById('chat-log');
  const input = document.getElementById('question-input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  function appendBubble(text, type) {
    const div = document.createElement('div');
    div.className = `bubble bubble-${type}`;
    div.textContent = text;
    chatLog.appendChild(div);
    return div;
  }

  function appendAIBubble(answer, sql, rowCount) {
    const div = document.createElement('div');
    div.className = 'bubble bubble-ai';

    const answerEl = document.createElement('div');
    answerEl.textContent = answer;
    div.appendChild(answerEl);

    if (sql) {
      const label = document.createElement('div');
      label.className = 'sql-label';
      label.textContent = '実行したSQL';
      div.appendChild(label);

      const sqlEl = document.createElement('div');
      sqlEl.className = 'sql-block';
      sqlEl.textContent = sql;
      div.appendChild(sqlEl);

      if (rowCount !== undefined) {
        const rc = document.createElement('div');
        rc.className = 'row-count';
        rc.textContent = `${rowCount}件取得`;
        div.appendChild(rc);
      }
    }

    chatLog.appendChild(div);
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatLog.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  async function sendQuestion(question) {
    if (!question) return;

    if (emptyState) emptyState.remove();

    appendBubble(question, 'user');
    scrollToBottom();

    input.value = '';
    input.style.height = '42px';
    sendBtn.disabled = true;

    const typing = showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        const errDiv = document.createElement('div');
        errDiv.className = 'bubble bubble-error';
        errDiv.textContent = data.error;
        if (data.sql) {
          const label = document.createElement('div');
          label.className = 'sql-label';
          label.textContent = '生成されたSQL';
          errDiv.appendChild(label);
          const sqlEl = document.createElement('div');
          sqlEl.className = 'sql-block';
          sqlEl.textContent = data.sql;
          errDiv.appendChild(sqlEl);
        }
        chatLog.appendChild(errDiv);
      } else {
        appendAIBubble(data.answer, data.sql, data.row_count);
      }
    } catch (e) {
      removeTyping();
      appendBubble('通信エラーが発生しました。', 'error');
    }

    sendBtn.disabled = false;
    scrollToBottom();
  }

  function sendSuggestion(el) {
    sendQuestion(el.textContent.trim());
  }

  sendBtn.addEventListener('click', () => {
    sendQuestion(input.value.trim());
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion(input.value.trim());
    }
  });

  // テキストエリアの自動リサイズ
  input.addEventListener('input', () => {
    input.style.height = '42px';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
</script>
{% endblock %}
